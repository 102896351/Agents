name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 06:00（北京时间 14:00）自动抓新闻 + 重新构建部署
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      # 抓取最新 AI 新闻（失败不阻断构建，保留现有数据）
      - name: Fetch AI news
        run: node scripts/fetch-news.mjs
        continue-on-error: true
      # 给本地图片 URL 加 ?v=2 cache-bust，避免 Cloudflare edge 缓存
      # 命中旧的（可能是占位图/损坏）版本。fetch-news 每次会重新生成
      # news.ts 且不带 ?v=，所以这一步是构建前必需的。
      - name: Cache-bust local image URLs
        run: node scripts/cachebust-images.cjs --v=2
        continue-on-error: true
      - run: npm run build
      # AdSense ads.txt must exist in the built artifact with the correct
      # publisher ID. Without this guard, an accidental removal or rename
      # of public/ads.txt would silently ship a 404 at the live origin,
      # breaking AdSense verification for days. Fail fast here instead.
      - name: Verify ads.txt in dist
        run: |
          if [ ! -f dist/ads.txt ]; then
            echo "::error::dist/ads.txt missing — AdSense will fail verification"
            exit 1
          fi
          if ! grep -q "pub-1606763409380030" dist/ads.txt; then
            echo "::error::dist/ads.txt publisher ID mismatch"
            cat dist/ads.txt
            exit 1
          fi
          echo "ads.txt OK: $(wc -c < dist/ads.txt) bytes"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

