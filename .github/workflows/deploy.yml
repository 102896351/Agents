name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 06:00（北京时�?14:00）重新构建部署一次，cron 仅触发构建，
    # 不会抓任何外部内容。站点所有数据来自仓库本身。
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      # AdSense ads.txt must exist in the built artifact with the correct
      # publisher ID. Without this guard, an accidental removal or rename
      # of public/ads.txt would silently ship a 404 at the live origin,
      # breaking AdSense verification for days. Fail fast here instead.
      - name: Verify ads.txt in dist
        run: |
          if [ ! -f dist/ads.txt ]; then
            echo "::error::dist/ads.txt missing — AdSense will fail verification"
            exit 1
          fi
          if ! grep -q "pub-1606763409380030" dist/ads.txt; then
            echo "::error::dist/ads.txt publisher ID mismatch"
            cat dist/ads.txt
            exit 1
          fi
          echo "ads.txt OK: $(wc -c < dist/ads.txt) bytes"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

