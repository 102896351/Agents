name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 06:00（北京时间 14:00）自动抓新闻 + 重新构建部署
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      # 抓取最新 AI 新闻（失败不阻断构建，保留现有数据）
      # IMPORTANT: only run on schedule, NOT on push. If we run on push, the
      # verbatim content from RSS overwrites any [auto] entries a human has
      # rewritten in news.ts between cron runs — which silently destroys
      # original-content work and re-exposes the site to duplicate-content
      # SEO risk. Push deploys should be deterministic: build whatever is
      # already committed in news.ts.
      - name: Fetch AI news
        if: github.event_name == 'schedule'
        run: node scripts/fetch-news.mjs
        continue-on-error: true
      # Cache-bust runs on the [auto] entries fetch-news just produced, so
      # same gate applies — only run on schedule.
      - name: Cache-bust local image URLs
        if: github.event_name == 'schedule'
        run: node scripts/cachebust-images.cjs --v=2
        continue-on-error: true
      - run: npm run build
      # AdSense ads.txt must exist in the built artifact with the correct
      # publisher ID. Without this guard, an accidental removal or rename
      # of public/ads.txt would silently ship a 404 at the live origin,
      # breaking AdSense verification for days. Fail fast here instead.
      - name: Verify ads.txt in dist
        run: |
          if [ ! -f dist/ads.txt ]; then
            echo "::error::dist/ads.txt missing — AdSense will fail verification"
            exit 1
          fi
          if ! grep -q "pub-1606763409380030" dist/ads.txt; then
            echo "::error::dist/ads.txt publisher ID mismatch"
            cat dist/ads.txt
            exit 1
          fi
          echo "ads.txt OK: $(wc -c < dist/ads.txt) bytes"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

